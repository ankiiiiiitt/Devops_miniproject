{% extends "dashboard_base.html" %}

{% block styles %}
<style>
        body { padding: 40px; }

        .result-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(18px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(168,85,247,0.25);
            animation: fadeIn 0.8s ease;
        }

        .result-container h1 {
            text-align: center;
            color: #a855f7;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .section-title {
            color: #38bdf8;
            font-size: 24px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-top: 35px;
        }

        .content-box {
            background: rgba(255,255,255,0.03);
            padding: 24px;
            border-radius: 12px;
            line-height: 1.8;
            font-size: 15px;
            color: #e2e8f0;
            white-space: pre-wrap;
        }

        .btn-home {
            display: block;
            width: 220px;
            margin: 40px auto 10px auto;
            padding: 14px;
            background: transparent;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-home:hover {
            background: #38bdf8;
            color: #020617;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(56,189,248,0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
{% endblock %}

{% block content %}
<div class="tool-container-flex">

<div class="result-container">
    <h1>Document Insights ✨</h1>
    
    <div class="section-title" style="display: flex; justify-content: space-between; align-items: center;">
        Summary
        <button class="btn-bookmark" data-content="{{ summary }}" data-type="AI Summary" onclick="handleBookmarkClick(this)" title="Bookmark Summary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        </button>
    </div>
    <div class="content-box">{{ summary }}</div>
    
    <div class="section-title" style="display: flex; justify-content: space-between; align-items: center;">
        Exam Questions
        <button class="btn-bookmark" data-content="{% for q in questions %}{{ q }}\n{% endfor %}" data-type="AI Questions" onclick="handleBookmarkClick(this)" title="Bookmark Questions">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        </button>
    </div>
    <div class="content-box">
        {% for q in questions %}
            <p>{{ q }}</p>
        {% endfor %}
    </div>

    <a href="/" class="btn-home">🏠 Return Home</a>
</div>

</div>
{% endblock %}
