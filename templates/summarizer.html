{% extends "dashboard_base.html" %}

{% block styles %}
<style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .summarizer-box {
            width: 720px;
            padding: 40px;
            border-radius: 22px;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(18px);
            box-shadow: 0 0 60px rgba(56,189,248,0.25);
            animation: fadeUp 0.8s ease;
        }

        .summarizer-box h2 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        .summarizer-box p {
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 18px;
            border-radius: 14px;
            border: none;
            outline: none;
            resize: none;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
            transition: 0.3s;
        }

        textarea:focus {
            box-shadow: 0 0 0 2px #38bdf8;
        }

        .action {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .summarize-btn {
            width: 220px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #020617;
            font-weight: 500;
            transition: 0.3s;
        }

        .summarize-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 0 25px #38bdf8;
        }

        .back-link {
            text-decoration: none;
            font-size: 14px;
            color: #a855f7;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #38bdf8;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LIGHT MODE SUPPORT */
        body.light .summarizer-box {
            background: rgba(255,255,255,0.9);
            color: #020617;
        }

        body.light textarea {
            background: #f1f5f9;
            color: #020617;
        }
    </style>
{% endblock %}

{% block content %}
<div class="tool-container-flex">

<div class="summarizer-box">

    <h2>Smart Summarizer</h2>
    <p>Paste your content and get a clear, concise summary instantly</p>

    {% if error %}
        <p style="color:#f87171; text-align:center;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <textarea name="user_text" placeholder="Paste your text here..." required></textarea>

        <div class="action">
            <button type="submit" class="summarize-btn">✨ Summarize Now</button>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </form>

</div>

</div>
{% endblock %}
