<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Plan Generator | FocusVault</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            width: 760px;
            padding: 42px;
            border-radius: 24px;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(18px);
            box-shadow: 0 0 70px rgba(56,189,248,0.28);
            animation: fadeUp 0.8s ease;
        }

        .form-box h1 {
            text-align: center;
            font-size: 32px;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .form-box p.sub {
            text-align: center;
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 28px;
        }

        input, textarea {
            width: 100%;
            padding: 16px;
            margin-bottom: 18px;
            border-radius: 14px;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            box-shadow: 0 0 0 2px #38bdf8;
        }

        .date-row {
            display: flex;
            gap: 18px;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .btn {
            width: 220px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #020617;
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: scale(1.06);
            box-shadow: 0 0 24px #38bdf8;
        }

        .btn-secondary {
            background: transparent;
            color: #a855f7;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            color: #38bdf8;
            border-color: #38bdf8;
        }

        .error {
            color: #f87171;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LIGHT MODE SUPPORT */
        body.light .form-box {
            background: rgba(255,255,255,0.95);
            color: #020617;
        }

        body.light input,
        body.light textarea {
            background: #f1f5f9;
            color: #020617;
        }
    </style>
</head>
<body>

<div class="form-box">

    <h1>Study Plan Generator 📅</h1>
    <p class="sub">Create a personalized study schedule based on your syllabus</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="syllabus"
            placeholder="Enter syllabus (e.g. Semester 3 Subjects)"
            required>

        <textarea
            name="topics"
            placeholder="Enter topics (comma separated or line-wise)"
            rows="4"
            required></textarea>

        <div class="date-row">
            <input type="date" name="start_date" required>
            <input type="date" name="deadline" required>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary">🚀 Generate Plan</button>

            <a href="/">
                <button type="button" class="btn btn-secondary">🏠 Home</button>
            </a>
        </div>

    </form>

</div>

</body>
</html>
