{% extends "dashboard_base.html" %}

{% block styles %}
<style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result-box {
            width: 780px;
            padding: 44px;
            border-radius: 26px;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(18px);
            box-shadow: 0 0 70px rgba(56,189,248,0.28);
            animation: fadeUp 0.8s ease;
        }

        .result-box h1 {
            text-align: center;
            font-size: 34px;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .result-box p.sub {
            text-align: center;
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 28px;
        }

        .plan-area {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 20px;
            padding: 30px;
            font-size: 15px;
            line-height: 1.8;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            white-space: pre-line;
            max-height: 420px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .plan-area:hover {
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.25);
        }

        .plan-area::-webkit-scrollbar {
            width: 6px;
        }

        .plan-area::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
        }

        .actions {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .btn {
            width: 230px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #020617;
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: scale(1.06);
            box-shadow: 0 0 24px #38bdf8;
        }

        .btn-secondary {
            background: transparent;
            color: #a855f7;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            color: #38bdf8;
            border-color: #38bdf8;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LIGHT MODE SUPPORT */
        body.light .result-box {
            background: rgba(255,255,255,0.95);
            color: #020617;
        }

        body.light .plan-area {
            background: #f1f5f9;
            color: #020617;
        }
    </style>
{% endblock %}

{% block content %}
<div class="tool-container-flex">

<div class="result-box">

    <h1>Your Study Plan 📘</h1>
    <p class="sub">A personalized schedule designed to help you stay consistent</p>

    <div class="plan-area">
        {{ plan | safe }}
    </div>

    <div class="actions">
        <div style="width: 100%; text-align: center; margin-bottom: 15px;">
            <span style="background: rgba(56, 189, 248, 0.1); color: #38bdf8; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid rgba(56, 189, 248, 0.2);">
                ✨ {{ milestones|length }} Topics ready to track
            </span>
        </div>

        <button class="btn btn-primary" onclick="syncToProgress()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: middle;"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            Sync to My Progress
        </button>

        <button class="btn btn-secondary" data-content="{{ plan }}" data-type="Study Plan" onclick="handleBookmarkClick(this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: middle;"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
            Bookmark Plan
        </button>

        <a href="{{ url_for('study_plan') }}">
            <button class="btn btn-secondary">↺ Create Another</button>
        </a>
    </div>

</div>

</div>

<!-- Hidden Sync Data -->
<script>
    const syncData = {
        subject: "{{ subject }}",
        topics: {{ milestones | tojson | safe }}
    };
    console.log("Study Planner Sync Data:", syncData);

    async function syncToProgress() {
        if (!syncData.topics || syncData.topics.length === 0) {
            alert("No milestones found in this plan to sync. Try creating another plan!");
            return;
        }

        const btn = event.currentTarget;
        const originalText = btn.innerHTML;
        btn.innerHTML = "Syncing...";
        btn.disabled = true;

        try {
            const res = await fetch('/api/study-progress/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(syncData)
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                btn.innerHTML = "✓ Synced!";
                setTimeout(() => {
                    window.location.href = "/study-progress";
                }, 1000);
            } else {
                alert("Error: " + data.error);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        } catch (err) {
            alert("Failed to sync plan.");
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
</script>
{% endblock %}
