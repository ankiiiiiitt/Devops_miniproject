<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Plan Result | FocusVault</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result-box {
            width: 780px;
            padding: 44px;
            border-radius: 26px;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(18px);
            box-shadow: 0 0 70px rgba(56,189,248,0.28);
            animation: fadeUp 0.8s ease;
        }

        .result-box h1 {
            text-align: center;
            font-size: 34px;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .result-box p.sub {
            text-align: center;
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 28px;
        }

        .plan-area {
            background: #020617;
            border-radius: 18px;
            padding: 26px;
            font-size: 15px;
            line-height: 1.8;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
            white-space: pre-line;
            max-height: 420px;
            overflow-y: auto;
        }

        .plan-area::-webkit-scrollbar {
            width: 6px;
        }

        .plan-area::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
        }

        .actions {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .btn {
            width: 230px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #020617;
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: scale(1.06);
            box-shadow: 0 0 24px #38bdf8;
        }

        .btn-secondary {
            background: transparent;
            color: #a855f7;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            color: #38bdf8;
            border-color: #38bdf8;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LIGHT MODE SUPPORT */
        body.light .result-box {
            background: rgba(255,255,255,0.95);
            color: #020617;
        }

        body.light .plan-area {
            background: #f1f5f9;
            color: #020617;
        }
    </style>
</head>
<body>

<div class="result-box">

    <h1>Your Study Plan 📘</h1>
    <p class="sub">A personalized schedule designed to help you stay consistent</p>

    <div class="plan-area">
        {{ plan }}
    </div>

    <div class="actions">
        <a href="/study_plan">
            <button class="btn btn-primary">↺ Create Another Plan</button>
        </a>

        <a href="/">
            <button class="btn btn-secondary">🏠 Home</button>
        </a>
    </div>

</div>

</body>
</html>
