{% extends "dashboard_base.html" %}

{% block styles %}
<style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result-box {
            width: 760px;
            padding: 42px;
            border-radius: 24px;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(18px);
            box-shadow: 0 0 70px rgba(56,189,248,0.28);
            animation: fadeUp 0.8s ease;
        }

        .result-box h1 {
            text-align: center;
            font-size: 32px;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .result-box p.sub {
            text-align: center;
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 28px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            background: rgba(2, 6, 23, 0.5);
            padding: 22px 24px;
            margin-bottom: 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            border: 1px solid rgba(56, 189, 248, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        li:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(56, 189, 248, 0.6);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
            background: rgba(2, 6, 23, 0.8);
        }

        li::before {
            content: "✨";
            position: absolute;
            left: -35px;
            top: 22px;
            font-size: 18px;
            filter: drop-shadow(0 0 5px #38bdf8);
        }

        .actions {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .btn {
            width: 220px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #020617;
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: scale(1.06);
            box-shadow: 0 0 24px #38bdf8;
        }

        .btn-secondary {
            background: transparent;
            color: #a855f7;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            color: #38bdf8;
            border-color: #38bdf8;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LIGHT MODE SUPPORT */
        body.light .result-box {
            background: rgba(255,255,255,0.95);
            color: #020617;
        }

        body.light li {
            background: #f1f5f9;
            color: #020617;
        }
    </style>
{% endblock %}

{% block content %}
<div class="tool-container-flex">

<div class="result-box">

    <h1>Generated Questions ✨</h1>
    <p class="sub">Use these questions for exam practice and revision</p>

    <ul>
        {% for question in questions %}
            <li>{{ question | safe }}</li>
        {% endfor %}
    </ul>

    <div class="actions">
        <a href="{{ url_for('question_generator') }}">
            <button class="btn btn-primary">↺ Generate More</button>
        </a>

        <a href="/">
            <button class="btn btn-secondary">🏠 Home</button>
        </a>
    </div>

</div>

</div>
{% endblock %}
