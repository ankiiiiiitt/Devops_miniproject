<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question Answering | FocusVault</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qa-box {
            width: 760px;
            padding: 42px;
            border-radius: 24px;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(18px);
            box-shadow: 0 0 70px rgba(56,189,248,0.28);
            animation: fadeUp 0.8s ease;
        }

        .qa-box h2 {
            text-align: center;
            font-size: 32px;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .qa-box p.sub {
            text-align: center;
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 25px;
        }

        textarea,
        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 18px;
            border-radius: 14px;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: white;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
            transition: 0.3s;
        }

        textarea {
            min-height: 180px;
            resize: none;
        }

        textarea:focus,
        input:focus {
            box-shadow: 0 0 0 2px #38bdf8;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .btn {
            width: 200px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #020617;
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: scale(1.06);
            box-shadow: 0 0 24px #38bdf8;
        }

        .btn-secondary {
            background: transparent;
            color: #a855f7;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            color: #38bdf8;
            border-color: #38bdf8;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LIGHT MODE SUPPORT */
        body.light .qa-box {
            background: rgba(255,255,255,0.95);
            color: #020617;
        }

        body.light textarea,
        body.light input {
            background: #f1f5f9;
            color: #020617;
        }
    </style>
</head>
<body>

<div class="qa-box">

    <h2>Question Answering</h2>
    <p class="sub">Paste your content and ask questions to get precise answers</p>

    {% if error %}
        <p style="color:#f87171; text-align:center;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/qa">

        <textarea
            name="context"
            placeholder="Paste the context / paragraph here..."
            required></textarea>

        <input
            type="text"
            name="question"
            placeholder="Type your question here..."
            required>

        <div class="actions">
            <button type="submit" class="btn btn-primary">✨ Get Answer</button>
            <a href="/">
                <button type="button" class="btn btn-secondary">🏠 Home</button>
            </a>
        </div>

    </form>

</div>

</body>
</html>
