<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Notes (PDF) | FocusVault</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            width: 560px;
            padding: 42px;
            border-radius: 24px;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(18px);
            box-shadow: 0 0 70px rgba(56,189,248,0.28);
            animation: fadeUp 0.8s ease;
            text-align: center;
        }

        .form-box h1 {
            font-size: 32px;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .form-box p.sub {
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 25px;
        }

        input[type="file"] {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px dashed rgba(255,255,255,0.4);
            outline: none;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            background: rgba(2,6,23,0.5);
            color: white;
            transition: 0.3s;
            margin-bottom: 10px;
            cursor: pointer;
        }

        input[type="file"]:hover {
            border-color: #38bdf8;
            background: rgba(56,189,248,0.1);
        }

        .actions {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .btn {
            width: 220px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #020617;
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: scale(1.06);
            box-shadow: 0 0 24px #38bdf8;
        }

        .btn-secondary {
            background: transparent;
            color: #a855f7;
            border: 1px solid rgba(255,255,255,0.2);
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .btn-secondary:hover {
            color: #38bdf8;
            border-color: #38bdf8;
        }

        .error {
            color: #f87171;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="form-box">
    <h1>Upload Notes 📄</h1>
    <p class="sub">Upload a PDF to automatically summarize and generate questions. (Max ~20,000 characters processed)</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="pdf_file" accept=".pdf" required>

        <div class="actions">
            <button type="submit" class="btn btn-primary">🚀 AI Magic</button>
            <a href="/" class="btn btn-secondary">🏠 Home</a>
        </div>
    </form>
</div>

</body>
</html>
