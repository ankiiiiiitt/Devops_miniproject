<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Summary Result | FocusVault</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result-box {
            width: 760px;
            padding: 42px;
            border-radius: 24px;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(18px);
            box-shadow: 0 0 70px rgba(56,189,248,0.28);
            animation: fadeUp 0.8s ease;
        }

        .result-box h2 {
            text-align: center;
            font-size: 34px;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .result-box p.sub {
            text-align: center;
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 25px;
        }

        .summary-area {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 20px;
            padding: 30px;
            font-size: 15px;
            line-height: 1.8;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            white-space: pre-line;
            min-height: 220px;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .summary-area:hover {
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.25);
            transform: translateY(-2px);
        }

        .actions {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .btn {
            width: 180px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #020617;
        }

        .btn-primary:hover {
            transform: scale(1.06);
            box-shadow: 0 0 24px #38bdf8;
        }

        .btn-secondary {
            background: transparent;
            color: #a855f7;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            color: #38bdf8;
            border-color: #38bdf8;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LIGHT MODE */
        body.light .result-box {
            background: rgba(255,255,255,0.95);
            color: #020617;
        }

        body.light .summary-area {
            background: #f1f5f9;
            color: #020617;
        }
    </style>
</head>
<body>

<div class="result-box">

    <h2>Summary Ready ✨</h2>
    <p class="sub">Here’s a clear and simplified version of your content</p>

    <div class="summary-area">
        {{ summary }}
    </div>

    <div class="actions">
        <a href="/summarizer">
            <button class="btn btn-primary">↺ Summarize Again</button>
        </a>

        <a href="/">
            <button class="btn btn-secondary">🏠 Home</button>
        </a>
    </div>

</div>

</body>
</html>
