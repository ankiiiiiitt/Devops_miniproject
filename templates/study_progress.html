{% extends "dashboard_base.html" %}

{% block styles %}
<style>
    .progress-workspace {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding-bottom: 50px;
        transform-style: preserve-3d;
    }

    .analytics-header {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        margin-bottom: 50px;
        transform: translateZ(60px);
    }

    .stat-card {
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 24px;
        transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .stat-card:hover {
        transform: translateY(-10px) translateZ(80px);
        background: rgba(15, 23, 42, 0.6);
        border-color: var(--primary);
    }

    .stat-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 0 30px var(--primary-glow);
    }

    .stat-info h3 { font-size: 14px; color: #94a3b8; margin-bottom: 4px; }
    .stat-info p { font-size: 32px; font-weight: 700; color: white; }

    .subjects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
        gap: 30px;
    }

    .subject-card {
        background: rgba(15, 23, 42, 0.3);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        padding: 35px;
        position: relative;
        overflow: hidden;
        transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        transform-style: preserve-3d;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
    }

    .subject-card:hover {
        transform: translateZ(50px) rotateX(2deg);
        border-color: var(--primary-glow);
    }

    .subject-title { font-size: 24px; font-weight: 700; color: white; margin-bottom: 25px; }

    .progress-pill {
        height: 12px;
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 100px;
        margin-bottom: 20px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        box-shadow: 0 0 20px var(--primary-glow);
        transition: 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .topic-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 30px;
    }

    .topic-item {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.03);
        padding: 14px 20px;
        border-radius: 16px;
        transition: 0.3s;
        border: 1px solid transparent;
        cursor: pointer;
        position: relative;
        z-index: 10;
        pointer-events: auto;
        user-select: none;
        transform: translateZ(10px); /* Force in front of card surface */
    }

    .topic-item:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateX(8px) translateZ(15px); /* Maintain elevation */
        border-color: rgba(56, 189, 248, 0.3);
    }

    .topic-item.done {
        background: linear-gradient(90deg, rgba(56, 189, 248, 0.1), rgba(99, 102, 241, 0.05));
        border-color: rgba(56, 189, 248, 0.3);
        box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.05);
    }

    .neon-checkbox {
        width: 24px;   /* Slightly larger */
        height: 24px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
        flex-shrink: 0;
    }

    .topic-item.done .neon-checkbox {
        background: var(--primary);
        border-color: var(--primary);
        box-shadow: 0 0 15px var(--primary-glow);
    }

    .topic-text { 
        flex: 1; 
        font-size: 15px; 
        color: #cbd5e1; 
        transition: 0.3s; 
        position: relative;
    }

    .topic-item.done .topic-text { 
        color: #64748b; 
        opacity: 0.7;
    }

    .topic-item.done .topic-text::after {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        width: 100%;
        height: 1.5px;
        background: rgba(56, 189, 248, 0.4);
        transform: scaleX(1);
        transform-origin: left;
        transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .add-subject-fab {
        position: fixed;
        bottom: 40px;
        right: 40px;
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 30px;
        box-shadow: 0 15px 40px var(--primary-glow);
        cursor: pointer;
        transition: 0.4s;
        z-index: 2000;
        transform: translateZ(100px);
    }

    .add-subject-fab:hover {
        transform: scale(1.1) rotate(90deg) translateZ(120px);
        box-shadow: 0 20px 60px var(--primary-glow);
    }

    /* PREMIUM MODAL REDESIGN */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(25px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 3000;
        animation: fadeIn 0.4s ease;
    }

    .modal-overlay.active { display: flex; }

    .modal.card {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(50px);
        border: 1px solid rgba(56, 189, 248, 0.2);
        width: 500px;
        padding: 45px;
        border-radius: 35px;
        box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
        transform: perspective(1000px) rotateX(10deg);
        animation: modalEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
    }

    .modal-header h2 {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .close-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        color: white;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
    }

    .close-btn:hover {
        background: #f43f5e;
        border-color: #f43f5e;
        transform: rotate(90deg);
    }

    .form-group { margin-bottom: 25px; }

    .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
        margin-left: 5px;
    }

    .glass-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 16px 20px;
        color: white;
        font-size: 15px;
        transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-input:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: #38bdf8;
        box-shadow: 0 0 25px rgba(56, 189, 248, 0.3);
        outline: none;
        transform: scale(1.02);
    }

    #saveSubject {
        margin-top: 15px;
        height: 60px;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: #020617;
        font-weight: 700;
        font-size: 16px;
        border-radius: 18px;
        border: none;
        cursor: pointer;
        transition: 0.4s;
        box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
    }

    #saveSubject:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(56, 189, 248, 0.5);
        filter: brightness(1.2);
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalEntrance {
        from { opacity: 0; transform: perspective(1000px) translateY(50px) rotateX(20deg); }
        to { opacity: 1; transform: perspective(1000px) translateY(0) rotateX(10deg); }
    }
</style>
{% endblock %}

{% block content %}
<div class="progress-workspace">
    <div class="analytics-header">
        <div class="stat-card">
            <div class="stat-icon">📚</div>
            <div class="stat-info"><h3>Total Subjects</h3><p id="totalSubjects">0</p></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📈</div>
            <div class="stat-info"><h3>Overall Progress</h3><p id="overallPercentage">0%</p></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🔥</div>
            <div class="stat-info"><h3>Daily Streak</h3><p id="streakCount">0</p></div>
        </div>
    </div>

    <div class="subjects-grid" id="subjectsGrid">
        <!-- Subjects added via JS -->
    </div>
</div>

<div class="add-subject-fab" id="addBtn">+</div>

<!-- Modal logic simplified for the 3D redesign -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal card">
        <div class="modal-header">
            <h2>Add Subject Workspace</h2>
            <button class="close-btn" id="closeModal">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Subject Title</label>
                <input type="text" id="subjectName" class="glass-input" placeholder="e.g. Artificial Intelligence">
            </div>
            <div class="form-group">
                <label>Topics (One per line)</label>
                <textarea id="topicsList" class="glass-input" rows="6" placeholder="e.g. Neural Networks&#10;Backpropagation&#10;CNNs"></textarea>
            </div>
            <button id="saveSubject" class="btn btn-primary" style="width: 100%; padding: 16px;">Initialize Workspace</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const grid = document.getElementById('subjectsGrid');
    const modal = document.getElementById('modalOverlay');

    async function loadData() {
        const res = await fetch('/api/study-progress');
        const data = await res.json();
        
        document.getElementById('totalSubjects').textContent = data.stats.total_subjects;
        document.getElementById('overallPercentage').textContent = data.stats.overall_percentage + '%';
        document.getElementById('streakCount').textContent = data.stats.streak;

        grid.innerHTML = '';
        data.subjects.forEach(subject => {
            const percentage = Math.round((subject.completed_topics / subject.total_topics) * 100);
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `
                <div class="subject-title">${subject.subject}</div>
                <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px;">
                    <span style="color: grey;">${subject.completed_topics}/${subject.total_topics} Topics</span>
                    <span style="color: var(--primary); font-weight: 600;">${percentage}%</span>
                </div>
                <div class="progress-pill">
                    <div class="progress-fill" style="width: ${percentage}%"></div>
                </div>
                <div class="topic-list">
                    ${subject.topics.map(t => `
                        <div class="topic-item ${t.done ? 'done' : ''}" onclick="toggleTopic('${subject._id}', '${t.name}')">
                            <div class="neon-checkbox">${t.done ? '✓' : ''}</div>
                            <span class="topic-text">${t.name}</span>
                        </div>
                    `).join('')}
                </div>
                <button onclick="deleteSubject('${subject._id}')" style="margin-top: 30px; background: transparent; border: none; color: #ef4444; font-size: 13px; cursor: pointer;">Delete Workspace</button>
            `;
            grid.appendChild(card);
        });
    }

    async function toggleTopic(subjectId, topicName) {
        await fetch('/api/study-progress/toggle-topic', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ subject_id: subjectId, topic_name: topicName })
        });
        loadData();
    }

    async function deleteSubject(id) {
        if(!confirm("Are you sure? This will remove all progress.")) return;
        await fetch(`/api/study-progress/delete/${id}`, { method: 'POST' });
        loadData();
    }

    document.getElementById('addBtn').onclick = () => modal.classList.add('active');
    document.getElementById('closeModal').onclick = () => modal.classList.remove('active');

    document.getElementById('saveSubject').onclick = async () => {
        const subject = document.getElementById('subjectName').value;
        const topics = document.getElementById('topicsList').value.split('\n');
        
        await fetch('/api/study-progress/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ subject, topics })
        });
        
        modal.classList.remove('active');
        loadData();
    };

    loadData();
</script>
{% endblock %}
